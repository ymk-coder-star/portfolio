<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" sizes="32x32" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="author" content="Yisroel Krausz" />
    <meta name="description" content="__SITE_DESCRIPTION__" />
    <link rel="canonical" href="__SITE_URL__/" />

    <!-- Open Graph — values injected from src/constants/site.js via npm run inject-meta -->
    <meta property="og:locale" content="en_GB" />
    <meta property="og:site_name" content="__SITE_NAME__" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="__SITE_TITLE__" />
    <meta property="og:description" content="__SITE_DESCRIPTION__" />
    <meta property="og:url" content="__SITE_URL__/" />
    <meta property="og:image" content="__OG_IMAGE_URL__" />
    <meta property="og:image:alt" content="Screenshot of the Code Canvas website" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="694" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="__SITE_TITLE__" />
    <meta name="twitter:description" content="__SITE_DESCRIPTION__" />
    <meta name="twitter:image" content="__OG_IMAGE_URL__" />
    <meta name="twitter:image:alt" content="Screenshot of the Code Canvas website" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>__SITE_TITLE__</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
