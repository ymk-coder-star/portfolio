<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>

    <script>
      // GitHub Pages SPA redirect fix
      var path = window.location.pathname + window.location.search + window.location.hash;
      sessionStorage.redirect = path;
      window.location.replace('/projects-guide/');
    </script>
  </head>
  <body></body>
</html>
